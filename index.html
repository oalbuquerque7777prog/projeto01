<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Helix Cash - Official</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Telas de Autenticação e Menu */
        .overlay-container {
            position: absolute; width: 100%; height: 100%; 
            background: rgba(5,5,5,0.95); z-index: 2000; 
            display: flex; align-items: center; justify-content: center;
        }

        #menu-container {
            background: #151515; padding: 25px; border-radius: 24px;
            text-align: center; color: white; border: 2px solid #00ccff;
            width: 85%; max-width: 340px; box-shadow: 0 0 50px rgba(0,0,0,0.9);
        }

        /* HUD Jogo */
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 5; display: none; pointer-events: none; }
        .info { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 4px solid #00ccff; font-size: 13px; }
        .lucro-style { border-left-color: #00ff00; color: #00ff00; }

        /* Estilos Internos */
        .menu-screen { display: none; }
        .menu-screen.active { display: block; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .nav-btn { background: #2a2a2a; color: white; border: 1px solid #444; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-deposito { background: #007bff !important; }
        .btn-saque { background: #6c757d !important; }

        input.auth-input { width: 85%; padding: 12px; margin: 8px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; text-align: center; }
        
        .bet-box { display: flex; justify-content: center; align-items: center; margin: 15px 0; background: #000; border-radius: 10px; padding: 8px; }
        .bet-btn { background: #00ccff; color: #000; border: none; width: 40px; height: 40px; font-size: 20px; font-weight: bold; border-radius: 8px; }
        input#valorAposta { width: 80px; background: transparent; color: #00ff00; border: none; font-size: 20px; text-align: center; font-weight: bold; outline: none; }

        button.main-action { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        #btnSacar {
            display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 18px 45px; background: #ffc107; color: #000; border: none; border-radius: 50px;
            font-size: 20px; font-weight: 900; z-index: 1000;
        }

        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #ffff00; font-size: 24px; font-weight: 900; display: none; z-index: 10; }
    </style>
</head>
<body>

    <!-- TELA DE CADASTRO -->
    <div id="auth-screen" class="overlay-container">
        <div id="menu-container">
            <h2 style="color:#00ccff; margin-bottom: 5px;">CADASTRO</h2>
            <p style="color:#888; font-size: 13px; margin-bottom: 20px;">Insira seus dados para jogar</p>
            <input type="text" id="regUser" class="auth-input" placeholder="Nome de Usuário">
            <input type="password" id="regPass" class="auth-input" placeholder="Sua Senha">
            <button class="main-action" id="btnCadastrar" style="margin-top: 15px;">CRIAR CONTA</button>
        </div>
    </div>

    <!-- HUD DO JOGO -->
    <div id="ui">
        <div class="info">💰 SALDO: R$ <span id="saldo">0.00</span></div>
        <div class="info lucro-style">💎 LUCRO: R$ <span id="lucro">0.00</span></div>
        <div class="info">🎮 FASE: <span id="level">1</span></div>
    </div>

    <div id="msg">LEVEL UP!</div>

    <!-- MENU PRINCIPAL (Oculto até o login) -->
    <div id="main-menu" class="overlay-container" style="display: none;">
        <div id="menu-container">
            
            <div id="screen-main" class="menu-screen active">
                <h2 style="margin:0; color:#00ccff;">HELIX CASH</h2>
                <p style="color:#aaa; font-size: 14px;">Olá, <b id="displayUser">...</b></p>
                <p style="color:#888;">Banca: R$ <span id="bancaMenu">0.00</span></p>

                <div class="nav-grid">
                    <button class="nav-btn" onclick="openTab('screen-conta')">👤 CONTA</button>
                    <button class="nav-btn" onclick="openTab('screen-saldo')">💰 SALDO</button>
                    <button class="nav-btn btn-deposito" onclick="openTab('screen-deposito')">📥 DEPÓSITO</button>
                    <button class="nav-btn btn-saque" onclick="openTab('screen-saque')">📤 SAQUE</button>
                </div>

                <div class="bet-box">
                    <button class="bet-btn" onclick="adjustBet(-0.5)">-</button>
                    <input type="number" id="valorAposta" value="1.00" readonly>
                    <button class="bet-btn" onclick="adjustBet(0.5)">+</button>
                </div>
                <button class="main-action" id="btnIniciar">APOSTAR AGORA</button>
                <p onclick="clearData()" style="color: #555; font-size: 10px; margin-top: 20px; cursor: pointer;">RESETAR DADOS</p>
            </div>

            <div id="screen-sub" class="menu-screen">
                <button onclick="openTab('screen-main')" style="background:none; border:none; color:#00ccff; cursor:pointer;">← VOLTAR</button>
                <div id="sub-content" style="margin-top: 20px;"></div>
            </div>

        </div>
    </div>

    <button id="btnSacar">SACAR LUCRO 💸</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
    <script>
        // Lógica de abas simples
        function openTab(tabId) {
            const main = document.getElementById('screen-main');
            const sub = document.getElementById('screen-sub');
            const content = document.getElementById('sub-content');

            if(tabId === 'screen-main') {
                sub.classList.remove('active');
                main.classList.add('active');
            } else {
                main.classList.remove('active');
                sub.classList.add('active');
                let titulos = { 'screen-conta': 'MINHA CONTA', 'screen-saldo': 'HISTÓRICO', 'screen-deposito': 'DEPÓSITO PIX', 'screen-saque': 'SAQUE RÁPIDO' };
                content.innerHTML = `<h3>${titulos[tabId]}</h3><p style="color:#888;">Funcionalidade em desenvolvimento para sua conta.</p>`;
            }
        }
    </script>
</body>
</html>
