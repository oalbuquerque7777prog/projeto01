<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dash - Neon Red</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <header>
        <div class="logo">CRYPTO<span>NEON</span></div>
        <div id="connection-status" class="status-online">Sistema Online</div>
    </header>

    <main class="dashboard">
        <div class="crypto-card" id="card-bitcoin">
            <div class="card-header">
                <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.svg" alt="BTC">
                <div class="coin-info">
                    <h2>Bitcoin</h2>
                    <span class="symbol">BTC/USDT</span>
                </div>
                <div class="price-container">
                    <div class="price" id="btc-price">$0.00</div>
                    <div class="change" id="btc-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="btc-chart"></div>
        </div>

        <div class="crypto-card" id="card-ethereum">
            <div class="card-header">
                <img src="https://cryptologos.cc/logos/ethereum-eth-logo.svg" alt="ETH">
                <div class="coin-info">
                    <h2>Ethereum</h2>
                    <span class="symbol">ETH/USDT</span>
                </div>
                <div class="price-container">
                    <div class="price" id="eth-price">$0.00</div>
                    <div class="change" id="eth-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="eth-chart"></div>
        </div>

        <div class="crypto-card" id="card-solana">
            <div class="card-header">
                <img src="https://cryptologos.cc/logos/solana-sol-logo.svg" alt="SOL">
                <div class="coin-info">
                    <h2>Solana</h2>
                    <span class="symbol">SOL/USDT</span>
                </div>
                <div class="price-container">
                    <div class="price" id="sol-price">$0.00</div>
                    <div class="change" id="sol-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="sol-chart"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
