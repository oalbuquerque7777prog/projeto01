<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dash - Live</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

    <header>
        <div class="logo">CRYPTO<span>NEON</span></div>
        <div id="status" class="status-online">Conectando...</div>
    </header>

    <main class="dashboard">
        <div class="crypto-card">
            <div class="card-header">
                <img src="https://assets.coingecko.com/coins/images/1/small/bitcoin.png" alt="BTC">
                <div class="coin-info">
                    <h2>Bitcoin</h2>
                    <span class="symbol">BTC/USD</span>
                </div>
                <div class="price-container">
                    <div class="price" id="90-price">---</div>
                    <div class="change" id="90-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="90-chart"></div>
        </div>

        <div class="crypto-card">
            <div class="card-header">
                <img src="https://assets.coingecko.com/coins/images/279/small/ethereum.png" alt="ETH">
                <div class="coin-info">
                    <h2>Ethereum</h2>
                    <span class="symbol">ETH/USD</span>
                </div>
                <div class="price-container">
                    <div class="price" id="80-price">---</div>
                    <div class="change" id="80-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="80-chart"></div>
        </div>

        <div class="crypto-card">
            <div class="card-header">
                <img src="https://assets.coingecko.com/coins/images/4128/small/solana.png" alt="SOL">
                <div class="coin-info">
                    <h2>Solana</h2>
                    <span class="symbol">SOL/USD</span>
                </div>
                <div class="price-container">
                    <div class="price" id="48543-price">---</div>
                    <div class="change" id="48543-change">0.00%</div>
                </div>
            </div>
            <div class="chart-container" id="48543-chart"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
